<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/icons/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel</title>

    <!-- Preconnect and preload fonts for faster LCP -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      as="style"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Optional: Critical CSS inline (for hero/header if any) -->
    <style>
      /* Example: basic body styles inline for faster paint */
      body {
        margin: 0;
        font-family: 'Roboto', sans-serif;
        background-color: #f9fafb;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Main React entry -->
    <script type="module" src="/src/main.jsx" defer></script>

    <!-- Razorpay script loaded async to avoid blocking -->
    <script
      src="https://checkout.razorpay.com/v1/checkout.js"
      async
    ></script>
  </body>
</html>
