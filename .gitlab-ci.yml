stages:
  - test

playwright-login-test:
  stage: test
  image: mcr.microsoft.com/playwright:v1.44.0-jammy
  script:
    - npm ci
    - npx playwright install chromium --with-deps
    - npx playwright test tests/NDE_Admin/Customer.spec.js --project=chromium
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 1 week