# ================================
# TEST STAGE (Playwright)
# ================================
playwright-job:
  stage: test
  image: mcr.microsoft.com/playwright:v1.44.0-jammy
  tags: 
  - superadmin
  script:
    - npm ci --legacy-peer-deps
    # Ensures the necessary browser binaries are installed in the container
    - npx playwright install chromium --with-deps
    - npx playwright test login.spec.js --project=chromium
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 1 week

